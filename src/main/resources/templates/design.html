<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Web App Status</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f8; margin: 0; }
        .topbar { background-color: #059669; color: white; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        .topbar a { color: white; text-decoration: none; margin-left: 12px; font-weight: bold; }
        .topbar a:hover { text-decoration: underline; }
        .content-wrapper { display: flex; justify-content: center; align-items: center; height: calc(100vh - 56px); }
        .status-box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); text-align: center; }
        .status { color: green; font-size: 24px; font-weight: bold; }
        .subtext { margin-top: 10px; color: #555; }
        .user-info { font-size: 14px; }
    </style>
</head>
<body>
    <div class="topbar">
        <div>SmartCart</div>
        <div class="user-info">
            <span th:if="${userEmail != null}">
                Logged in as <span th:text="${userEmail}"></span>
                <a href="/logout">Logout</a>
            </span>
            <span th:if="${userEmail == null}">
                <a href="/login">Login</a>
                <a href="/register">Register</a>
            </span>
        </div>
    </div>
    <div class="content-wrapper">
        <div class="status-box">
            <div class="status">✔ Application is Running</div>
            <div class="subtext">If you can see this page, your web app is successfully open.</div>
        </div>
    </div>
</body>
</html>
