<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - SmartCart</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f8; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 32px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 360px; }
        h1 { margin-top: 0; color: #059669; font-size: 24px; }
        label { display: block; margin-top: 12px; font-weight: bold; color: #374151; }
        input[type="email"], input[type="password"] { width: 100%; padding: 10px; margin-top: 6px; border-radius: 4px; border: 1px solid #d1d5db; box-sizing: border-box; }
        button { margin-top: 18px; width: 100%; padding: 10px; border-radius: 4px; border: none; background-color: #059669; color: white; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #047857; }
        .error { margin-top: 10px; color: #b91c1c; }
        .link { margin-top: 12px; text-align: center; font-size: 14px; }
        a { color: #2563eb; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="box">
    <h1>Create an account</h1>

    <div th:if="${error}" class="error" th:text="${error}"></div>

    <form method="post" action="/register">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" th:value="${email}" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" required>

        <label for="confirmPassword">Confirm Password</label>
        <input id="confirmPassword" name="confirmPassword" type="password" required>

        <button type="submit">Sign Up</button>
    </form>

    <div class="link">
        Already have an account?
        <a href="/login">Log in</a>
    </div>
</div>
</body>
</html>
